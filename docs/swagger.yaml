basePath: /
definitions:
  book.BookDTO:
    properties:
      author:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      isbn:
        type: string
      pages:
        type: integer
      published_year:
        type: integer
      publisher:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  book.BookResponse:
    properties:
      data:
        $ref: '#/definitions/book.BookDTO'
      message:
        type: string
      success:
        type: boolean
    type: object
  book.BooksResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/book.BookDTO'
        type: array
      message:
        type: string
      success:
        type: boolean
      total:
        type: integer
    type: object
  book.CreateBookRequest:
    properties:
      author:
        type: string
      description:
        type: string
      isbn:
        type: string
      pages:
        type: integer
      published_year:
        type: integer
      publisher:
        type: string
      title:
        type: string
    required:
    - author
    - title
    type: object
  book.UpdateBookRequest:
    properties:
      author:
        type: string
      description:
        type: string
      isbn:
        type: string
      pages:
        type: integer
      published_year:
        type: integer
      publisher:
        type: string
      title:
        type: string
    required:
    - author
    - title
    type: object
  user.AuthResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
      token:
        type: string
      user:
        $ref: '#/definitions/user.UserDTO'
    type: object
  user.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  user.RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - full_name
    - password
    - username
    type: object
  user.UpdatePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  user.UpdateUsernameRequest:
    properties:
      new_username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - new_username
    type: object
  user.UserDTO:
    properties:
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: integer
      updated_at:
        type: string
      username:
        type: string
    type: object
  user.UserResponse:
    properties:
      data:
        $ref: '#/definitions/user.UserDTO'
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: Type "Bearer" followed by a space and JWT token.
  title: Monthly Expense API
  version: "1.0"
paths:
  /api/v1/users/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: User credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/user.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/user.AuthResponse'
      summary: Login user
      tags:
      - users
  /api/v1/users/logout:
    post:
      consumes:
      - application/json
      description: Clear authentication token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UserResponse'
      summary: Logout user
      tags:
      - users
  /api/v1/users/profile:
    get:
      consumes:
      - application/json
      description: Get the authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/user.UserResponse'
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - users
  /api/v1/users/profile/password:
    put:
      consumes:
      - application/json
      description: Update the authenticated user's password
      parameters:
      - description: Password update data
        in: body
        name: password
        required: true
        schema:
          $ref: '#/definitions/user.UpdatePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/user.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/user.UserResponse'
      security:
      - BearerAuth: []
      summary: Update password
      tags:
      - users
  /api/v1/users/profile/username:
    put:
      consumes:
      - application/json
      description: Update the authenticated user's username
      parameters:
      - description: New username
        in: body
        name: username
        required: true
        schema:
          $ref: '#/definitions/user.UpdateUsernameRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/user.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/user.UserResponse'
      security:
      - BearerAuth: []
      summary: Update username
      tags:
      - users
  /api/v1/users/register:
    post:
      consumes:
      - application/json
      description: Create a new user account
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/user.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/user.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/user.AuthResponse'
      summary: Register a new user
      tags:
      - users
  /books:
    get:
      consumes:
      - application/json
      description: Get books with pagination support and optional author search
      parameters:
      - default: 1
        description: Page number (1-based)
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page (max 100)
        in: query
        name: limit
        type: integer
      - description: Filter by author name
        in: query
        name: author
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.BooksResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/book.BooksResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/book.BooksResponse'
      security:
      - BearerAuth: []
      summary: Get books with pagination and search
      tags:
      - books
    post:
      consumes:
      - application/json
      description: Create a new book entry
      parameters:
      - description: Book creation data
        in: body
        name: book
        required: true
        schema:
          $ref: '#/definitions/book.CreateBookRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/book.BookResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/book.BookResponse'
      summary: Create a new book
      tags:
      - books
  /books/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a book by its ID
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.BookResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/book.BookResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/book.BookResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/book.BookResponse'
      security:
      - BearerAuth: []
      summary: Delete book
      tags:
      - books
    get:
      consumes:
      - application/json
      description: Get a book by its ID
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.BookResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/book.BookResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/book.BookResponse'
      summary: Get book by ID
      tags:
      - books
    put:
      consumes:
      - application/json
      description: Update a book's information
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: integer
      - description: Book update data
        in: body
        name: book
        required: true
        schema:
          $ref: '#/definitions/book.UpdateBookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book.BookResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/book.BookResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/book.BookResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/book.BookResponse'
      security:
      - BearerAuth: []
      summary: Update book
      tags:
      - books
schemes:
- http
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
